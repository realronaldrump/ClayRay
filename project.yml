name: ClayRay
options:
  bundleIdPrefix: com.clayray
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  ClayRay:
    type: application
    platform: macOS
    sources:
      - ClayRay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clayray.app
        INFOPLIST_FILE: ClayRay/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClayRay/Resources/ClayRay.entitlements
        PRODUCT_NAME: ClayRay
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: ClayRay/Resources/ClayRay.entitlements
